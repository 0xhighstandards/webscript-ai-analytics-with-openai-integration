<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script Analyzer Chat</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 800px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        display: flex;
        flex-direction: column;
        height: 90vh;
        max-height: 700px;
      }

      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px;
        border-radius: 10px 10px 0 0;
        text-align: center;
      }

      .header h1 {
        font-size: 24px;
        margin-bottom: 5px;
      }

      .header p {
        font-size: 12px;
        opacity: 0.9;
      }

      .chat-area {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .message {
        padding: 12px 16px;
        border-radius: 10px;
        max-width: 80%;
        word-wrap: break-word;
        line-height: 1.4;
      }

      .user-message {
        align-self: flex-end;
        background: #667eea;
        color: white;
        border-radius: 10px 10px 0 10px;
      }

      .bot-message {
        align-self: flex-start;
        background: #f0f0f0;
        color: #333;
        border-radius: 10px 10px 10px 0;
        white-space: pre-wrap;
      }

      .loading {
        align-self: flex-start;
        background: #f0f0f0;
        color: #666;
        padding: 12px 16px;
        border-radius: 10px;
      }

      .input-area {
        border-top: 1px solid #eee;
        padding: 15px;
        display: flex;
        gap: 10px;
      }

      textarea {
        flex: 1;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-family: "Courier New", monospace;
        font-size: 13px;
        resize: vertical;
        max-height: 100px;
      }

      textarea:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
      }

      button {
        padding: 10px 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: transform 0.2s;
      }

      button:hover {
        transform: scale(1.05);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: scale(1);
      }

      .error {
        align-self: flex-start;
        background: #fee;
        color: #c33;
        padding: 12px 16px;
        border-radius: 10px;
        border-left: 4px solid #c33;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Script Analyzer</h1>
        <p>Paste your JavaScript code and get AI analysis</p>
      </div>

      <div class="chat-area" id="chatArea"></div>

      <div class="input-area">
        <textarea
          id="scriptInput"
          placeholder="Paste your JavaScript code here..."
          rows="3"
        ></textarea>
        <button onclick="sendMessage()" id="sendBtn">Send</button>
      </div>
    </div>

    <script>
      const chatArea = document.getElementById("chatArea");
      const scriptInput = document.getElementById("scriptInput");
      const sendBtn = document.getElementById("sendBtn");

      function addMessage(text, isUser) {
        const messageDiv = document.createElement("div");
        messageDiv.className = isUser
          ? "message user-message"
          : "message bot-message";
        messageDiv.textContent = text;
        chatArea.appendChild(messageDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
      }

      function addLoadingMessage() {
        const loadingDiv = document.createElement("div");
        loadingDiv.className = "loading";
        loadingDiv.id = "loading";
        loadingDiv.textContent = "Analyzing...";
        chatArea.appendChild(loadingDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
      }

      function removeLoadingMessage() {
        const loading = document.getElementById("loading");
        if (loading) loading.remove();
      }

      async function sendMessage() {
        const script = scriptInput.value.trim();

        if (!script) {
          alert("Please paste some code first!");
          return;
        }

        // Add user message
        addMessage(script, true);
        scriptInput.value = "";
        sendBtn.disabled = true;

        // Add loading message
        addLoadingMessage();

        try {
          const response = await fetch("/analyze", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ script: script }),
          });

          removeLoadingMessage();

          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          const data = await response.json();

          if (data.error) {
            addMessage("Error: " + data.error, false);
          } else {
            addMessage(data.result, false);
          }
        } catch (error) {
          removeLoadingMessage();
          const errorDiv = document.createElement("div");
          errorDiv.className = "error";
          errorDiv.textContent =
            "Error: " +
            error.message +
            "\nMake sure the Flask server is running on http://localhost:5000";
          chatArea.appendChild(errorDiv);
          chatArea.scrollTop = chatArea.scrollHeight;
        }

        sendBtn.disabled = false;
        scriptInput.focus();
      }

      // Send on Enter (Ctrl+Enter for new line)
      scriptInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter" && !event.ctrlKey) {
          event.preventDefault();
          sendMessage();
        }
      });

      // Initial message
      addMessage(
        "Hello! Paste your JavaScript code and I'll analyze it for you.",
        false,
      );
      scriptInput.focus();
    </script>
  </body>
</html>
